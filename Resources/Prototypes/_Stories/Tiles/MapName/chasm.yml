- type: entity
  id: STFloorChasmTeleporter
  name: chasm
  description: You can't even see the bottom.
  suffix: Teleporter
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: ChasmTeleporter
  - type: StepTrigger
    requiredTriggeredSpeed: 0
    intersectRatio: 0.4
    blacklist:
      tags:
      - Catwalk
  - type: Transform
    anchored: true
  - type: Clickable
  - type: Sprite
    sprite: _Stories/Tiles/MapName/green_cave_chasm.rsi
    drawdepth: BelowFloor
    layers:
    - state: chasm
  - type: Icon
    sprite: _Stories/Tiles/MapName/green_cave_chasm.rsi
    state: full
  - type: IconSmooth
    key: chasm
    additionalKeys:
    - walls
    base: chasm
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        layer:
        - WallLayer
        mask:
        - ItemMask
        density: 1000
        hard: false
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  parent: MarkerBase
  id: STFloorChasmTeleporterTarget
  name: chasm destination
  suffix: Teleporter
  components:
  - type: ChasmTeleporterTarget
  - type: Sprite
    drawdepth: Overdoors
    sprite: Markers/cross.rsi
    layers:
    - state: blue
